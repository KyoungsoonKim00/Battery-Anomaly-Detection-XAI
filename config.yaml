# config.yaml
env:
  device: "auto"
  random_seed: 42

data:
  sample_dir: "./data/sample/"
  window_size: 30
  
  # 1. 학습용 (오직 정상 10xx 데이터만)
  train_files: 
    - "1001_chg.csv"
    - "1002_chg.csv" 
    
  # 2. 임계값(Threshold) 튜닝용 Validation 셋 (정상 1개 + 불량 1개)
  val_files:
    - "Test01_OK_chg.csv"
    - "Test05_NG_chg.csv"
    
  # 3. 최종 성능 평가용 Test 셋 (Val에 쓰이지 않은 미지의 데이터)
  test_files:
    - "Test02_OK_chg.csv"
    - "Test03_OK_chg.csv"
    - "Test04_OK_chg.csv"
    - "Test06_NG_chg.csv"
    - "Test07_NG_dchg.csv"

train:
  batch_size: 64
  learning_rate: 0.001
  epochs: 100